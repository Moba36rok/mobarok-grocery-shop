<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grocery Store | Mobarok Online</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="script.js" defer></script>
</head>
<body>
  <nav class="glass-nav">
    <div class="nav-container">
      <a href="index.html">← Back to Services</a>
      <span class="brand">Grocery Mart</span>
      <button id="openCartBtn" class="btn-primary" style="width:auto;">🛒 Cart (<span id="cartCount">0</span>)</button>
    </div>
  </nav>

  <main>
    <section class="hero-mini">
      <h1>Fresh Groceries</h1>
      <p>Delivered to your doorstep in Lalchandabad, Babultali</p>
    </section>

    <div id="productGrid" class="grid"></div>
  </main>
  <form name="New_Orders" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="customer_name" />
    <input type="text" name="phone" />
    <textarea name="address"></textarea>
    <input type="text" name="payment_method" />
    <input type="text" name="total_amount" />
    <textarea name="order_summary"></textarea>
  </form>

  <div id="toastContainer"></div>


  <div id="cartModal" class="modal hidden">
    <div class="modal-content">
      <button class="close" data-target="cartModal">&times;</button>
      <h3 style="color: var(--primary); margin-top: 0;">Shopping Cart</h3>
      <div id="cartItems"></div>
    </div>
  </div>
</body>
</html>
