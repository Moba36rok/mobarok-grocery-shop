backend:
  name: git-gateway
  branch: main 

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "catalog"
    label: "Store Catalog"
    files:
      - label: "Products List"
        name: "products"
        file: "data/products.json"
        fields:
          - label: "Inventory"
            name: "items"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Price", name: "price", widget: "number", value_type: "float"}
              - {label: "Stock", name: "stock_status", widget: "select", options: ["In Stock", "Out of Stock"]}
              - {label: "Unit", name: "unit", widget: "select", options: ["piece", "packet", "grams", "kg", "liter"]}
              - {label: "Image", name: "img", widget: "image", required: false}

  # NEW: Document Inbox for Uploaded Files
  - name: "uploads"
    label: "Document Inbox"
    folder: "images/uploads"
    create: false
    fields:
      - {label: "Uploaded File", name: "file", widget: "file"}
      - {label: "Time Received", name: "date", widget: "datetime"}
